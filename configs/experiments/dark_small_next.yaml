protocol:
  name: DroneVehicle-DarkSmall-v1
  threshold_source: train_only
  allow_test_tuning: false
  crop_border_px: 100
defaults:
  root: /mnt/disk2/lhr/VSD
  python: /mnt/disk2/lhr/conda_envs/vsd/bin/python
  yolo_model: /mnt/disk2/lhr/VSD/weights/pretrained/yolo11n.pt
  project: /mnt/disk2/lhr/VSD/results/val
  device: '0'
  seed: 0
  split: val
  epochs: 100
  workers: 16
  batch_single:
    '640': 32
    '768': 32
    '960': 32
  batch_fusion:
    '640': 16
    '768': 8
  case:
    topk: 30
    max_images: 80
    batch: 16
    skip_viz: true
data:
  rgb: /mnt/disk2/lhr/VSD/configs/dronevehicle_resplit/dronevehicle_resplit_rgb.yaml
  ir: /mnt/disk2/lhr/VSD/configs/dronevehicle_resplit/dronevehicle_resplit_ir.yaml
