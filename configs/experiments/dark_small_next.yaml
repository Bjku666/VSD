protocol:
  name: DroneVehicle-DarkSmall-v1
  threshold_source: train_only
  allow_test_tuning: false
  crop_border_px: 100
  first_round_limit:
    - E0
    - E1
    - E2
    - E3
    - E4

global:
  root: /mnt/disk2/lhr/VSD
  output_root: /mnt/disk2/lhr/VSD/results/val
  audit_root: /mnt/disk2/lhr/VSD/results/dataset_audit
  device: "0"
  seed: 0
  imgsz: 640
  epochs: 100
  batch: 96
  workers: 16
  pretrained: /mnt/disk2/lhr/VSD/weights/pretrained/yolo11n.pt

experiments:
  - id: E0
    name: protocol_audit_and_build
    type: dataset_protocol
    status: todo
    command: >
      /mnt/disk2/lhr/conda_envs/vsd/bin/python /mnt/disk2/lhr/VSD/scripts/dataset_resplit_dronevehicle.py all
      --raw-root /mnt/disk2/lhr/VSD/data/DroneVehicle/raw
      --prepared-root /mnt/disk2/lhr/VSD/prepared/dronevehicle_resplit
      --config-root /mnt/disk2/lhr/VSD/configs/dronevehicle_resplit
      --report-root /mnt/disk2/lhr/VSD/results/dataset_audit
    outputs:
      - /mnt/disk2/lhr/VSD/results/dataset_audit/pair_audit.json
      - /mnt/disk2/lhr/VSD/results/dataset_audit/train_thresholds.json
      - /mnt/disk2/lhr/VSD/results/dataset_audit/subset_counts.csv
      - /mnt/disk2/lhr/VSD/results/dataset_audit/protocol_summary.md
    acceptance:
      - train/val/test 主划分不变
      - 阈值只来自 train
      - RGB/IR/RGB-IR yaml 已生成
      - E0 不通过不进入 E1-E4

  - id: E1
    name: rgb_only_baseline
    type: train_val
    status: blocked
    depends_on:
      - E0
    command: >
      /bin/bash /mnt/disk2/lhr/VSD/scripts/train/e1_train_rgb_only.sh 0 32 e1_yolo11n_rgb_only_640_ddp 16 bg
    outputs:
      - /mnt/disk2/lhr/VSD/results/val/e1_yolo11n_rgb_only_640_ddp/weights/best.pt
      - /mnt/disk2/lhr/VSD/results/val/e1_yolo11n_rgb_only_640_ddp/weights/last.pt
      - /mnt/disk2/lhr/VSD/results/val/e1_yolo11n_rgb_only_640_ddp/required_metrics.json
    acceptance:
      - best.pt 存在
      - required_metrics.json 存在
      - 完成 val 评估

  - id: E2
    name: ir_only_baseline
    type: train_val
    status: blocked
    depends_on:
      - E0
    command: >
      /bin/bash /mnt/disk2/lhr/VSD/scripts/train/e2_train_ir_only.sh 0 32 e2_yolo11n_ir_only_640_ddp 16 bg
    outputs:
      - /mnt/disk2/lhr/VSD/results/val/e2_yolo11n_ir_only_640_ddp/weights/best.pt
      - /mnt/disk2/lhr/VSD/results/val/e2_yolo11n_ir_only_640_ddp/weights/last.pt
      - /mnt/disk2/lhr/VSD/results/val/e2_yolo11n_ir_only_640_ddp/required_metrics.json
    acceptance:
      - best.pt 存在
      - required_metrics.json 存在
      - 完成 val 评估

  - id: E3
    name: late_fusion_nms
    type: fusion_val
    status: blocked
    depends_on:
      - E1
      - E2
    command: >
      /bin/bash /mnt/disk2/lhr/VSD/scripts/train/e3_val_late_fusion_nms.sh val /mnt/disk2/lhr/VSD/results/val/e1_yolo11n_rgb_only_640_ddp/weights/best.pt /mnt/disk2/lhr/VSD/results/val/e2_yolo11n_ir_only_640_ddp/weights/best.pt /mnt/disk2/lhr/VSD/results/val/e3_late_fusion_nms_val 0
    outputs:
      - /mnt/disk2/lhr/VSD/results/val/e3_late_fusion_nms_val/required_metrics.json
    acceptance:
      - 使用 E1 / E2 新权重
      - 只在 val 上评估

  - id: E4
    name: late_fusion_wbf
    type: fusion_val
    status: blocked
    depends_on:
      - E1
      - E2
    command: >
      /bin/bash /mnt/disk2/lhr/VSD/scripts/train/e4_val_late_fusion_wbf.sh val /mnt/disk2/lhr/VSD/results/val/e1_yolo11n_rgb_only_640_ddp/weights/best.pt /mnt/disk2/lhr/VSD/results/val/e2_yolo11n_ir_only_640_ddp/weights/best.pt /mnt/disk2/lhr/VSD/results/val/e4_late_fusion_wbf_val 0
    outputs:
      - /mnt/disk2/lhr/VSD/results/val/e4_late_fusion_wbf_val/required_metrics.json
    acceptance:
      - 使用 E1 / E2 新权重
      - 只在 val 上评估
